name: Build & Deploy Funnel Dashboard

on:
  # Cloud schedule (backup): every 2 hours at minute 0 (UTC).
  schedule:
    - cron: '0 */2 * * *'
  # Manual run button in the Actions tab.
  workflow_dispatch:
  # External trigger used by cron-job.org (POST /dispatches with event_type "rebuild").
  repository_dispatch:
    types: [rebuild]

# Least-privilege token for Pages deploy. No personal access token is stored in the repo.
permissions:
  contents: read
  pages: write
  id-token: write

# Never run two deploys at once; let the newest win.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Fetch sheets and build data.json
        run: node build.mjs

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact (public/)
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./public

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
